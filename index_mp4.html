<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO-AGRABAH : 프레임 레이트의 반란</title>
<style>
  /* ════════════════════════════════════════════════════════════
     [1] 전역 CSS 변수 (디자인 토큰)
     ────────────────────────────────────────────────────────────
     여기서 게임 전체에서 쓰는 색상/효과 값을 한 번에 관리해요.
     색을 바꾸고 싶으면 여기 값만 수정하면 전체에 반영돼요.
     ════════════════════════════════════════════════════════════ */
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    /* 배경 & 패널 기본 색상 — 신비 보라 테마 */
    --bg: #0d0818;        /* 전체 배경: 깊은 보라 검정 */
    --panel: #120d20;     /* 패널 배경: 짙은 보라 */
    --border: #2d1f4a;    /* 테두리 기본: 어두운 보라 */

    /* 포인트 컬러 — 사막 금빛 & 보라 계열 */
    --cyan: #c9a227;      /* 사막 금빛 — INTEG 바, 대사 화자 색 */
    --red: #e05c8a;       /* 마젠타 핑크 — NOISE 바, 경고 */
    --green: #b87fd4;     /* 신비 보라 — SYNC 바, 긍정 변화 */
    --gold: #f0c040;      /* 밝은 금빛 포인트 */
    --purple-light: #9d6ec9; /* 연보라 */

    /* 텍스트 색상 */
    --text: #e8dff5;      /* 일반 텍스트: 연한 라벤더 */
    --dim: #5a4870;       /* 흐린 텍스트: 중간 보라 */

    /* 네온 글로우 효과 — 금빛 & 보라 */
    --glow-c: 0 0 8px rgba(201,162,39,0.6), 0 0 20px rgba(201,162,39,0.25);
    --glow-r: 0 0 8px rgba(224,92,138,0.5), 0 0 20px rgba(224,92,138,0.2);
    --glow-g: 0 0 8px rgba(184,127,212,0.5), 0 0 20px rgba(184,127,212,0.2);
    --glow-gold: 0 0 12px rgba(240,192,64,0.7), 0 0 30px rgba(240,192,64,0.3);

    /* 색수차 효과 — 보라/금 어긋남 */
    --aberration: -2px 0 rgba(224,92,138,0.7), 2px 0 rgba(201,162,39,0.7), 0 1px rgba(184,127,212,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at 30% 20%, #1a0d33 0%, #0d0818 40%, #070410 100%);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
    position: relative;
  }

  /* ════════════════════════════════════════════════════════════
     [2] 배경 효과 — 그리드 & CRT 스캔라인
     ────────────────────────────────────────────────────────────
     body의 ::before와 ::after 가상 요소를 써서
     실제 HTML 요소 추가 없이 배경 효과를 넣어요.
     ════════════════════════════════════════════════════════════ */

  /* 格子·스캔라인 제거됨 */

  /* ════════════════════════════════════════════════════════════
     [5] 전체 앱 레이아웃
     ════════════════════════════════════════════════════════════ */
  #app {
    position: relative;
    z-index: 10;
    max-width: 1400px; /* 이 값을 바꾸면 전체 게임 최대 너비 조절 */
    margin: 0 auto;
    padding: 0 8px 40px;
  }

  /* ════════════════════════════════════════════════════════════
     [6] HUD (상단 고정 헤더)
     ────────────────────────────────────────────────────────────
     position: sticky로 스크롤해도 항상 맨 위에 붙어있어요.
     왼쪽(제목)과 오른쪽(변수 바들)으로 나뉜 좌우 레이아웃.
     ════════════════════════════════════════════════════════════ */
  #hud {
    position: sticky;
    top: 0;
    z-index: 902;
    background: rgba(13,8,24,0.97);
    border-bottom: 2px dashed var(--border);
    padding: 12px 36px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
  }

  /* HUD 왼쪽: 게임 제목 영역 */
  #hud-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 260px;
    padding-right: 32px;
    border-right: 1px dashed var(--dim); /* 제목/변수 구분선 */
  }

  /* 게임 메인 제목 — 클릭 시 첫 화면으로 이동 */
  #hud .title-tag {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 2px;
    text-shadow: var(--aberration); /* 색수차 글리치 — 헤더 제목에만 유지 */
    white-space: nowrap;
    line-height: 1.2;
    cursor: pointer; /* 클릭 가능 표시 */
    transition: opacity 0.2s;
  }
  #hud .title-tag:hover { opacity: 0.75; }

  /* 게임 부제목 */
  #hud .title-sub-tag {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--dim);
    letter-spacing: 3px;
    margin-top: 4px;
    white-space: nowrap;
  }

  /* HUD 오른쪽: SYNC/INTEG/NOISE 변수 바 영역 */
  #hud-right {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1; /* 남은 공간 전부 차지 */
    padding-left: 32px;
  }

  /* 변수 블록 하나 (라벨 + 숫자 + 바) */
  .stat-block {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    flex: 1;
    padding: 0 20px;
    border-right: 1px dashed var(--dim); /* 각 변수 구분선 */
  }
  .stat-block:last-child { border-right: none; }

  .stat-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .stat-label { color: var(--dim); letter-spacing: 3px; font-size: 12px; }

  /* 변수 바 배경 트랙 */
  .stat-bar-wrap {
    width: 100%; height: 10px;
    background: #000;
    border: 1px solid #333;
    overflow: hidden;
  }

  /* 변수 바 채워지는 부분 — ease로 부드럽게 */
  .stat-bar { height: 100%; transition: width 0.5s ease; }
  .bar-sync  { background: var(--green); box-shadow: var(--glow-g); }
  .bar-integ { background: var(--cyan);  box-shadow: var(--glow-c); }
  .bar-noise { background: var(--red);   box-shadow: var(--glow-r); }

  /* 변수 숫자 값 */
  .stat-val { font-size: 18px; font-weight: 700; min-width: 36px; text-align: right; }
  .val-sync  { color: var(--green); text-shadow: var(--glow-g); }
  .val-integ { color: var(--cyan);  text-shadow: var(--glow-c); }
  .val-noise { color: var(--red);   text-shadow: var(--glow-r); }

  /* ════════════════════════════════════════════════════════════
     [7] 타이틀 화면
     ════════════════════════════════════════════════════════════ */
  #title-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  /* ── 타이틀 화면 — cover.png 배경 ── */
  #title-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
    /* ⭐ 첫 화면 배경 이미지 */
    background-image: url('image/cover.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }

  /* 이미지 위 어두운 오버레이 — 텍스트 가독성 확보 */
  #title-screen::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(8, 4, 20, 0.55);
    z-index: 1;
    pointer-events: none;
  }

  /* 램프 SVG 레이어는 제거 — cover.png가 대체 */
  #title-lamp-bg { display: none; }

  /* 타이틀 콘텐츠 — 이미지+오버레이 위에 표시 */
  #title-content { position: relative; z-index: 2; }
  .student-info {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 3px;
    margin-bottom: 28px;
  }

  /* 메인 타이틀 */
  .main-title {
    position: relative;
    font-family: 'Orbitron', monospace;
    font-size: clamp(30px, 6vw, 54px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 6px;
    line-height: 1.2;
    text-transform: uppercase;
  }
  .main-title::before, .main-title::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.8;
  }
  .main-title::before {
    left: 3px; text-shadow: -2px 0 rgba(224,92,138,0.7);
    animation: glitchLayer1 2.5s infinite linear alternate-reverse;
  }
  .main-title::after {
    left: -3px; text-shadow: 2px 0 rgba(201,162,39,0.7);
    animation: glitchLayer2 3s infinite linear alternate-reverse;
  }

  /* 타이핑 효과 — 커서 포함 */
  .typing-text {
    display: inline-block;
    overflow: hidden;
    white-space: pre-wrap;
    border-right: 2px solid var(--gold);
    animation: blinkCursor 0.8s step-end infinite;
  }
  .typing-text.done {
    border-right: none;
    animation: none;
  }
  @keyframes blinkCursor {
    0%, 100% { border-color: var(--gold); }
    50%       { border-color: transparent; }
  }

  /* 씬 내 타이핑 텍스트 */
  .scene-typing {
    display: inline;
    border-right: 1.5px solid var(--gold);
    animation: blinkCursor 0.8s step-end infinite;
  }
  .scene-typing.done {
    border-right: none;
    animation: none;
  }

  /* clip-path로 특정 부분만 보이게 해서 글리치 느낌 */
  @keyframes glitchLayer1 {
    0%, 100% { clip-path: inset(10% 0 80% 0); transform: translate(0); }
    20% { clip-path: inset(80% 0 10% 0); transform: translate(-2px, 2px); }
    40% { clip-path: inset(40% 0 50% 0); transform: translate(2px, -2px); }
    60% { clip-path: inset(90% 0 5% 0);  transform: translate(-2px, 0); }
  }
  @keyframes glitchLayer2 {
    0%, 100% { clip-path: inset(20% 0 60% 0); transform: translate(0); }
    30% { clip-path: inset(50% 0 30% 0); transform: translate(2px, -2px); }
    70% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 2px); }
  }

  .sub-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 2.5vw, 20px);
    color: var(--gold);
    text-shadow: var(--glow-gold);
    letter-spacing: 8px;
    margin-top: 10px;
  }

  /* 점선 구분선 — 금빛 */
  .title-divider {
    width: 300px; height: 2px;
    background: repeating-linear-gradient(90deg, var(--gold), var(--gold) 4px, transparent 4px, transparent 8px);
    margin: 30px auto;
    opacity: 0.5;
  }

  .title-desc {
    font-size: 14px; color: var(--text); line-height: 1.9; max-width: 520px;
    font-family: 'Share Tech Mono', monospace;
    opacity: 0.85;
    min-height: 5em;
  }

  /* ════════════════════════════════════════════════════════════
     [8] 씬 영역 전체 래퍼
     ════════════════════════════════════════════════════════════ */
  #scene-area {
    display: none;
    padding: 8px 0 0;
    overflow: hidden;
  }

  .scene-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px; padding: 0 4px;
  }

  .scene-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px; font-weight: 700;
    color: var(--red);
    border: 1px solid var(--red);
    background: rgba(224,92,138,0.1);
    padding: 4px 10px;
    text-shadow: var(--glow-r);
    letter-spacing: 2px;
    display: inline-block;
  }

  .scene-name {
    font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700;
    color: #fff;
    text-shadow: var(--aberration);
    letter-spacing: 2px;
  }

  /* 배경/환경 설명 박스 */
  .scene-bg-box {
    position: relative; z-index: 901;
    border-left: 3px solid var(--dim);
    background: rgba(13,8,24,0.95);
    padding: 9px 12px; margin-bottom: 10px; flex-shrink: 0;
    font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text);
    line-height: 1.5;
  }

  /* 대사 컨테이너 — 채팅창처럼 아래서 위로 쌓임 */
  .dialogue-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;   /* 새 항목은 항상 아래서 시작 */
    gap: 5px;
    overflow: hidden;            /* 넘치면 위쪽이 잘려서 사라짐 */
    position: relative;
    /* 상단 페이드 아웃 마스크 — 위쪽이 자연스럽게 사라지는 효과 */
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 18%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 18%);
  }

  /* 대사 박스 — 아래서 슬라이드인 */
  .dialogue-box {
    position: relative; z-index: 901;
    border: 1px solid var(--border);
    padding: 7px 12px 7px 18px;
    background: rgba(13,8,24,0.95);
    flex-shrink: 0;              /* 대사 박스 자체 높이는 유지 */
    /* 새 박스 등장 애니메이션 — 아래서 올라옴 */
    animation: dlgSlideUp 0.28s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  @keyframes dlgSlideUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .dialogue-box::before {
    content: '>'; position: absolute; left: 5px; top: 7px;
    color: var(--cyan); font-weight: bold; font-family: monospace; font-size: 12px;
  }

  .speaker {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--cyan);
    margin-bottom: 4px; font-weight: 700; letter-spacing: 1px;
  }

  .dialogue-text {
    font-size: 12px; color: #fff; line-height: 1.5;
    min-height: 1.5em;
  }

  /* 씬 메인 레이아웃 — 7:3 비율, 화면 딱 맞게 */
  .scene-layout {
    display: grid;
    grid-template-columns: 70% 30%;
    gap: 0;
    border: 2px solid var(--border);
    background: var(--panel);
    height: calc(100vh - 110px);
    position: relative;
    overflow: hidden;
  }

  /* 레이아웃 모서리 장식 (왼쪽 위 / 오른쪽 아래 꺾쇠) */
  .scene-layout::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 10px; height: 10px;
    border-top: 2px solid var(--text); border-left: 2px solid var(--text);
  }
  .scene-layout::after {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 10px; height: 10px;
    border-bottom: 2px solid var(--text); border-right: 2px solid var(--text);
  }

  /* ────────────────────────────────────────────
     왼쪽: 이미지 패널
     ──────────────────────────────────────────── */
  .scene-image-panel {
    height: 100%;
    background: #080412;
    border-right: 2px dashed var(--border);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .scene-image-placeholder {
    text-align: center;
    z-index: 2;
  }

  /* 이미지 패널 배경 대각선 패턴 (미세한 격자 장식) */
  .scene-image-panel::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(45deg, transparent 40%, rgba(255,34,68,0.03) 45%, transparent 50%),
      linear-gradient(-45deg, transparent 40%, rgba(0,245,255,0.03) 45%, transparent 50%);
    background-size: 60px 60px;
    opacity: 0.5;
  }

  /* 이미지 자리표시자 아이콘 — 마름모 모양 */
  .img-icon-wrap {
    width: 100px; height: 100px; margin: 0 auto 15px;
    border: 2px solid var(--dim);
    display: flex; align-items: center; justify-content: center;
    transform: rotate(45deg); /* 정사각형을 45도 돌려서 마름모로 */
    background: rgba(255,255,255,0.02);
  }
  /* 아이콘 텍스트는 역방향으로 돌려서 원래대로 보이게 */
  .img-icon {
    font-size: 40px; transform: rotate(-45deg);
    filter: drop-shadow(0 0 5px var(--cyan));
  }

  /* ────────────────────────────────────────────
     오른쪽: 콘텐츠 영역
     내용(scene-content-panel)은 위에서 flex: 1로 늘어나고
     선택지(scene-choice-panel)는 flex-shrink: 0으로 아래 고정
     ──────────────────────────────────────────── */
  .scene-right-col {
    height: 100%; display: flex; flex-direction: column; overflow: hidden;
  }

  /* 내용 영역 — 스크롤 없음, 남은 공간 전부 차지 */
  .scene-content-panel {
    flex: 1; overflow: hidden; padding: 26px 12px 8px; position: relative;
    display: flex; flex-direction: column;
  }

  /* 내용 영역 상단 레이블 */
  .scene-content-panel::before {
    content: 'C:\\SYS\\LOG_DATA.exe';
    position: absolute; top: 0; left: 0; right: 0;
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    background: #000; padding: 4px 12px; color: var(--dim);
    border-bottom: 1px solid var(--border);
    z-index: 5;
  }

  /* 배경 설명 — 타이핑 완료 후 사라짐 */
  .scene-bg-box {
    position: relative; z-index: 901;
    border-left: 3px solid var(--dim);
    background: rgba(13,8,24,0.95);
    padding: 7px 10px; margin-bottom: 6px; flex-shrink: 0;
    font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text);
    line-height: 1.45;
    transition: opacity 0.5s ease, max-height 0.5s ease, margin 0.5s ease, padding 0.5s ease;
    max-height: 200px; overflow: hidden;
  }
  .scene-bg-box.collapsed {
    opacity: 0;
    max-height: 0;
    margin-bottom: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  /* 조건 알림 (NOISE 높을 때, INTEG 부족할 때) */
  .condition-alert {
    position: relative; z-index: 901;
    border: 1px dotted var(--red); background: rgba(15, 0, 5, 0.95);
    padding: 7px 10px; margin-bottom: 6px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--red); text-shadow: var(--glow-r);
    flex-shrink: 0;
  }

  /* ════════════════════════════════════════════════════════════
     [10] 선택지 영역 (양탄자 컨셉 디자인)
     ────────────────────────────────────────────────────────────
     선택지 버튼이 '알라딘 양탄자'처럼 생기도록 디자인됐어요.
     ════════════════════════════════════════════════════════════ */

  /* 선택지 패널 — 항상 오른쪽 콘텐츠 아래에 고정 */
  .scene-choice-panel {
    flex-shrink: 0;
    background: #0a0616;
    padding: 14px 16px;
    border-top: 1px dashed var(--dim);
  }

  /* "SELECT ACTION" 레이블 */
  .choices-label {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim);
    margin-bottom: 12px; text-transform: uppercase;
  }

  /* A/B 선택지 좌우 2열 배치 */
  .choices-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

  /* ── 양탄자(Magic Carpet) 컨셉 선택지 버튼 ──────────────────
     ⭐ 이미지로 교체하고 싶은 부분이 바로 여기예요.
     현재는 CSS로 양탄자 모양을 흉내내고 있어요.
     이미지로 교체하는 방법은 코드 아래 설명 참조.
     ──────────────────────────────────────────────────────── */
  .choice-btn {
    position: relative;
    z-index: 901;
    background-color: var(--panel);
    background-image:
      repeating-linear-gradient(45deg,  rgba(201,162,39,0.015) 0px, rgba(201,162,39,0.015) 2px, transparent 2px, transparent 8px),
      repeating-linear-gradient(-45deg, rgba(184,127,212,0.015) 0px, rgba(184,127,212,0.015) 2px, transparent 2px, transparent 8px);
    border-top: 2px solid var(--border);
    border-bottom: 2px solid var(--border);
    border-left: 8px dotted var(--dim);
    border-right: 8px dotted var(--dim);
    border-radius: 6px;
    color: var(--text);
    padding: 11px 18px;
    text-align: left;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    line-height: 1.4;
    transition: all 0.3s ease-in-out;
    box-shadow: 0 4px 6px rgba(0,0,0,0.4);
  }

  /* 호버 시: 테두리 색 변경 + 양탄자가 떠오르는 애니메이션 */
  .choice-btn:hover {
    border-top-color: var(--cyan);
    border-bottom-color: var(--cyan);
    border-left-color: var(--cyan);
    border-right-color: var(--cyan);
    background-color: rgba(5, 15, 25, 0.95);
    box-shadow: 0 12px 20px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,245,255,0.15);
    animation: magicCarpetFloat 2s ease-in-out infinite;
  }

  /* 양탄자 부유 애니메이션 — 위아래로 둥실둥실 */
  @keyframes magicCarpetFloat {
    0%   { transform: translateY(-2px); }
    50%  { transform: translateY(-8px); }
    100% { transform: translateY(-2px); }
  }

  /* 선택지 키 레이블 ex) [A] 즉시 실행 */
  .choice-key {
    font-family: 'Orbitron', monospace; font-size: 12px;
    display: block; margin-bottom: 8px; color: #fff; font-weight: 700;
  }
  /* A 선택지: 시안 / B 선택지: 초록 */
  .choice-btn:nth-child(1) .choice-key { color: var(--cyan);  text-shadow: var(--glow-c); }
  .choice-btn:nth-child(2) .choice-key { color: var(--green); text-shadow: var(--glow-g); }

  /* 변수 변화 표시 ex) SYNC +20 | NOISE +10 */
  .choice-delta {
    font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim);
    display: block; margin-top: 12px; padding-top: 8px;
    border-top: 1px dotted var(--border);
  }

  /* ════════════════════════════════════════════════════════════
     [11] 변수 변화 팝업 (선택 시 화면 중앙에 뜨는 알림)
     ════════════════════════════════════════════════════════════ */
  #delta-log {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    z-index: 903; pointer-events: none;
  }

  .delta-item {
    font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 900;
    padding: 10px 30px; border-radius: 4px; letter-spacing: 4px;
    /* 부드러운 ease 애니메이션으로 교체 */
    animation: deltaFade 1.6s ease forwards;
    white-space: nowrap; text-transform: uppercase;
    background: #000; border: 2px solid;
  }
  .delta-pos { color: var(--green); border-color: var(--green); text-shadow: var(--glow-g); }
  .delta-neg { color: var(--red);   border-color: var(--red);   text-shadow: var(--glow-r); }
  .delta-neu { color: var(--cyan);  border-color: var(--cyan);  text-shadow: var(--glow-c); }

  /* 자연스럽게 나타났다 사라지는 팝업 애니메이션 */
  @keyframes deltaFade {
    0%   { opacity: 0; transform: translateY(12px) scale(0.9); }
    18%  { opacity: 1; transform: translateY(0)    scale(1.04); }
    35%  { transform: scale(1); }
    72%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-10px) scale(0.95); }
  }

  /* ════════════════════════════════════════════════════════════
     [12] 엔딩 화면
     ════════════════════════════════════════════════════════════ */
  #ending-screen {
    position: relative; z-index: 901;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 60px 20px; min-height: 80vh;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  /* 엔딩 이미지 위 어두운 오버레이 */
  #ending-screen::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(8, 4, 20, 0.60);
    z-index: 0;
    pointer-events: none;
  }
  #ending-screen > * { position: relative; z-index: 1; }

  /* 진엔딩/배드엔딩 레이블 */
  .ending-type { font-family: 'Share Tech Mono', monospace; font-size: 14px; letter-spacing: 4px; margin-bottom: 20px; }
  .ending-true { color: var(--green); }
  .ending-bad  { color: var(--red); }

  .ending-title {
    font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 900;

  /* 최종 점수 박스 */

    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    color: var(--dim); margin-bottom: 30px; line-height: 2;
    border: 1px solid var(--border); padding: 15px; background: rgba(0,0,0,0.5);
  }
  .ending-narration { font-size: 15px; line-height: 1.8; max-width: 500px; margin-bottom: 40px; }

  /* 공통 버튼 스타일 */
  .btn-primary {
    position: relative; z-index: 901;
    font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700;
    padding: 15px 40px; background: var(--bg);
    border: 2px solid var(--text); color: var(--text);
    cursor: pointer; text-transform: uppercase; transition: all 0.2s ease;
  }
  .btn-primary:hover { background: var(--text); color: var(--bg); font-weight: 900; }

  /* ════════════════════════════════════════════════════════════
     [13] 씬 전환 애니메이션 — 부드럽게
     ════════════════════════════════════════════════════════════ */
  #scene-area.fade-in { animation: sceneTransition 0.35s ease; }
  @keyframes sceneTransition {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

</style>

<script>
/* ════════════════════════════════════════════════════════════
   [JS-1] 게임 상태 변수
   ────────────────────────────────────────────────────────────
   게임 전체에서 쓰는 수치들이에요.
   초기값을 바꾸고 싶으면 여기 숫자를 수정하세요.
   ════════════════════════════════════════════════════════════ */
/* ════════════════════════════════════════════════════════════
   [JS-0] 타이핑 효과 유틸리티
   ────────────────────────────────────────────────────────────
   el: 텍스트를 넣을 DOM 요소
   text: 출력할 전체 텍스트 (줄바꿈 \n 지원)
   speed: 글자당 딜레이(ms), 기본 25
   onDone: 타이핑 완료 후 콜백
   ════════════════════════════════════════════════════════════ */
function typewriterEl(el, text, speed = 25, onDone = null) {
  if (!el) return;
  el.innerHTML = '';
  el.classList.add('scene-typing');
  let i = 0;
  const lines = text.split('\n');
  let lineIdx = 0, charIdx = 0;

  function tick() {
    if (lineIdx >= lines.length) {
      el.classList.remove('scene-typing');
      el.classList.add('done');
      if (onDone) onDone();
      return;
    }
    const line = lines[lineIdx];
    if (charIdx < line.length) {
      el.innerHTML += line[charIdx];
      charIdx++;
      setTimeout(tick, speed);
    } else {
      lineIdx++;
      charIdx = 0;
      if (lineIdx < lines.length) {
        el.innerHTML += '<br>';
        setTimeout(tick, speed + 30);
      } else {
        el.classList.remove('scene-typing');
        el.classList.add('done');
        if (onDone) onDone();
      }
    }
  }
  tick();
}

/* 타이틀 화면 타이핑 텍스트 */

function startTitleTyping() {
  const el = document.getElementById('title-typing-target');
  if (el) typewriterEl(el, TITLE_TEXT, 28);
}

   ════════════════════════════════════════════════════════════ */

      { 화자: 'GENIE.EXE', 색: 'var(--cyan)', 텍스트: '"기억? 그건 연산 효율을 떨어뜨리는 정크 데이터일 뿐이야. 아그라바에서는 프레임 레이트가 곧 인격이지. 넌 지금 초당 1프레임도 안 되는 쓰레기일 뿐이고."' },

    ],
    선택지: [
      { 키: '[A] 즉시 실행', 텍스트: '지금 당장 Lamp.exe를 실행해 성능을 끌어올린다.', 델타: { SYNC: -10, NOISE: +10 }, 다음: 'S02' },

/* ════════════════════════════════════════════════════════════
   [JS-3] 마키 업데이트
   ────────────────────────────────────────────────────────────
   상단 흘러가는 텍스트 내용을 바꿔요.
   체크프레임드롭()에서 씬 상황에 따라 자동 호출돼요.
   ════════════════════════════════════════════════════════════ */
function 마키업데이트(메시지) {
  const spans = document.querySelectorAll('.marquee-track span');
  spans.forEach(span => span.textContent = 메시지);
}

/* ════════════════════════════════════════════════════════════
   [JS-4] 프레임 드롭 연출 체크
   ────────────────────────────────────────────────────────────
   씬 전환 시마다 호출되어 두 가지 조건을 확인해요:
   1. NOISE ≥ 60: 감시망 과부하 상태
   2. 자파 씬(S05, S07): 자파 등장 씬
   위 조건이면 body에 fps-drop 클래스 추가 → 화면이 끊김
   ════════════════════════════════════════════════════════════ */
function 체크프레임드롭(씬ID) {
  const isHighNoise = 상태.NOISE >= 60;
  const isJafar = (씬ID === 'S05' || 씬ID === 'S07');

  if (isHighNoise || isJafar) {
    /* FPS 드롭 연출 켜기 */
    document.body.classList.add('fps-drop');
    마키업데이트('[WARN] FPS DROP DETECTED // SYSTEM OVERLOAD // JAFAR.ROOT PROXIMITY ALERT // ');
    document.querySelector('.system-marquee').style.background = 'var(--red)';
  } else {
    /* 정상 상태로 복귀 */
    document.body.classList.remove('fps-drop');
    마키업데이트('[SYS_LOG] RUNTIME ACTIVE // AWAITING INPUT // NORMAL OPERATION // ');
    document.querySelector('.system-marquee').style.background = '#000';
  }
}

/* ════════════════════════════════════════════════════════════
   [JS-5] HUD 수치 업데이트
   ────────────────────────────────────────────────────────────
   화면 상단 SYNC/INTEG/NOISE 바와 숫자를 현재 상태에 맞게 갱신해요.
   변수적용() 함수 뒤에 항상 자동으로 호출돼요.
   ════════════════════════════════════════════════════════════ */
function HUD업데이트() {
  /* c(v): 값을 0~100 사이로 강제 제한하는 클램프 함수 */
  const c = v => Math.max(0, Math.min(100, v));
  const s = c(상태.SYNC), i = c(상태.INTEG), n = c(상태.NOISE);

  /* 숫자 텍스트 업데이트 */
  document.getElementById('val-sync').textContent  = s;
  document.getElementById('val-integ').textContent = i;
  document.getElementById('val-noise').textContent = n;

  /* 바 너비 업데이트 (0%~100%) */
  document.getElementById('bar-sync').style.width  = s + '%';
  document.getElementById('bar-integ').style.width = i + '%';
  document.getElementById('bar-noise').style.width = n + '%';
}

/* ════════════════════════════════════════════════════════════
   [JS-6] 변수 변화 팝업
   ────────────────────────────────────────────────────────────
   선택지를 고르면 화면 중앙에 변화량이 크게 팝업으로 떠요.
   2초 후 자동으로 사라져요.
   ════════════════════════════════════════════════════════════ */
function 델타팝업(델타) {
  const log = document.getElementById('delta-log');

  Object.entries(델타).forEach(([k, v]) => {
    if (v === 0) return; /* 변화 없으면 팝업 안 띄움 */

    /* INTEG가 -999이면 "→ 0"으로 표시, 그 외 +/-n */
    const txt = (k === 'INTEG' && v === -999) ? '→ 0' : (v > 0 ? '+' + v : v);

    const el = document.createElement('div');
    /* NOISE는 낮아지면 좋으므로 음수일 때 초록(긍정), 양수일 때 빨강(부정) */
    el.className = 'delta-item ' + (
      (v > 0 && k !== 'NOISE') || (v < 0 && k === 'NOISE') ? 'delta-pos' : 'delta-neg'
    );
    el.textContent = `${k} ${txt}`;
    log.appendChild(el);

    /* 2초 후 팝업 제거 */
    setTimeout(() => el.remove(), 2000);
  });
}

/* ════════════════════════════════════════════════════════════
   [JS-7] 변수 적용
   ────────────────────────────────────────────────────────────
   선택지의 델타값을 상태에 반영하고 HUD를 갱신해요.
   특수='INTEG_ZERO'이면 INTEG를 0으로 강제 설정해요.
   ════════════════════════════════════════════════════════════ */
function 변수적용(델타, 특수) {
  Object.entries(델타).forEach(([k, v]) => {
    if (k in 상태) {
      if (특수 === 'INTEG_ZERO' && k === 'INTEG') {
        /* 지니 흡수 선택 시 INTEG 완전 소멸 */
        상태.INTEG = 0;
      } else {
        /* 일반 변화: 0~100 범위를 벗어나지 않게 클램프 */
        상태[k] = Math.max(0, Math.min(100, 상태[k] + v));
      }
    }
  });
  델타팝업(델타);
  HUD업데이트();
}

/* ════════════════════════════════════════════════════════════
   [JS-8] 씬 렌더링 (메인 함수)
   ────────────────────────────────────────────────────────────
   씬ID를 받아서 해당 씬의 HTML을 #scene-area에 그려요.
   대사는 채팅창처럼 아래서 하나씩 append되고,
   공간이 차면 위쪽부터 자연스럽게 올라가며 사라져요.
   ════════════════════════════════════════════════════════════ */
function 씬렌더(씬ID) {
  if (씬ID === 'S07') { renderS07(); return; }
  if (씬ID === 'S08') { renderS08(); return; }

  const 씬 = 씬목록[씬ID];
  const area = document.getElementById('scene-area');

  area.classList.remove('fade-in');
  void area.offsetWidth;
  area.classList.add('fade-in');
  area.style.display = 'block';

  let condHtml = 씬.조건로직 && 씬.조건로직(상태)
    ? `<div class="condition-alert">${씬.조건로직(상태)}</div>` : '';
  let loopHtml = (씬ID === 'S06' && 상태.루프횟수 > 0)
    ? `<div class="condition-alert" style="color:var(--cyan); border-color:var(--cyan)">
         SYS.RESTORE: 루프 ${상태.루프횟수}회차. INTEG 검증 실패.
       </div>` : '';

  const btns = 씬.선택지.map((c, i) => `
    <button class="choice-btn" onclick="선택(${i}, '${씬ID}')">
      <span class="choice-key">${c.키}</span>
      ${c.텍스트}
      <span class="choice-delta">${델타포맷(c.델타)}</span>
    </button>
  `).join('');

  area.innerHTML = `
    <div class="scene-header">
      <span class="scene-badge">${씬ID}</span>
      <span class="scene-name">${씬.name}</span>
    </div>
    <div class="scene-layout">
      <div class="scene-image-panel">
        <video
          src="mp4/${씬ID}.mp4"
          style="width:100%; height:100%; object-fit:cover; display:block;"
          autoplay loop muted playsinline
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
        ></video>
        <img
          src="image/${씬ID}.png"
          alt="${씬.name}"
          style="width:100%; height:100%; object-fit:cover; display:none;"
        />
      </div>
      <div class="scene-right-col">
        <div class="scene-content-panel">
          ${loopHtml}${condHtml}
          <!-- 대사가 동적으로 append될 빈 컨테이너 -->
          <div class="dialogue-list" id="dlg-list-${씬ID}"></div>
        </div>
        <div class="scene-choice-panel">
          <div class="choices-label">SELECT ACTION</div>
          <div class="choices-wrap">${btns}</div>
        </div>
      </div>
    </div>
  `;

  /* 배경 설명 + 대사목록을 합쳐서 하나의 순서열로 처리 */
  const 전체목록 = [
    /* 배경 설명을 NARRATION 형태로 맨 앞에 추가 */
    { 화자: 'SYSTEM LOG', 색: 'var(--dim)', 텍스트: 씬.배경 },
    ...씬.대사목록
  ];

  const listEl = document.getElementById(`dlg-list-${씬ID}`);
  채팅순서(listEl, 전체목록, 0);
}

/* 대사 목록을 순서대로 아래에 append하며 타이핑
   — 새 박스가 추가될 때 리스트 하단에 붙으므로
     컨테이너가 overflow:hidden이면 위쪽부터 자연스럽게 밀려 올라가며 사라짐 */
function 채팅순서(listEl, 목록, idx) {
  if (!listEl || idx >= 목록.length) return;

  const d = 목록[idx];

  /* 새 대사 박스 생성 */
  const box = document.createElement('div');
  box.className = 'dialogue-box';
  box.style.borderColor = `${d.색}44`;
  box.style.flexShrink = '0';

  const speakerEl = document.createElement('div');
  speakerEl.className = 'speaker';
  speakerEl.style.color = d.색;
  speakerEl.textContent = d.화자;

  const textEl = document.createElement('div');
  textEl.className = 'dialogue-text';

  box.appendChild(speakerEl);
  box.appendChild(textEl);

  /* 리스트 맨 아래에 추가 — 위에서 내려오지 않고 아래서 올라오는 느낌 */
  listEl.appendChild(box);

  /* 타이핑 시작 → 완료 후 다음 대사 */
  typewriterEl(textEl, d.텍스트, 20, () => {
    setTimeout(() => 채팅순서(listEl, 목록, idx + 1), 160);
  });
}

/* ════════════════════════════════════════════════════════════

function 보스판정(pass) {

  } else {
    상태.루프횟수++;
    상태.NOISE = Math.min(100, 상태.NOISE + 10);

/* ════════════════════════════════════════════════════════════
   [JS-11] 엔딩 화면 표시
   ════════════════════════════════════════════════════════════ */
function 엔딩(진엔딩, 점수) {
  document.getElementById('scene-area').style.display = 'none';
  const el = document.getElementById('ending-screen');
  el.style.display = 'flex';

  const endingVid = 진엔딩 ? 'mp4/S09.mp4' : 'mp4/S10.mp4';
  const endingImg = 진엔딩 ? 'image/S09.png' : 'image/S10.png';

  /* ⭐ innerHTML 먼저 — 그래야 video가 덮어쓰이지 않음 */
  if (진엔딩) {
    el.innerHTML = `
      <div class="ending-type ending-true">TRUE ENDING</div>
      <div class="ending-title">현실 로그아웃</div>
      <div class="ending-score">
        SCORE: ${점수} | SYNC: ${상태.SYNC} | INTEG: ${상태.INTEG} | NOISE: ${상태.NOISE}<br>
        LOOPS: ${상태.루프횟수}
      </div>
      <div class="ending-narration">투박하지만 차가운 현실의 공기가 폐부 깊숙이 들어온다.<br>나는 살아있다.</div>
      <button class="btn-primary" onclick="재시작()">[ SYSTEM REBOOT ]</button>
    `;
  } else {
    el.innerHTML = `
      <div class="ending-type ending-bad">BAD ENDING</div>
      <div class="ending-title" style="text-shadow:var(--glow-r)">시스템 관리자</div>
      <div class="ending-score">
        SCORE: ${점수} | SYNC: ${상태.SYNC} | INTEG: ${상태.INTEG} | NOISE: ${상태.NOISE}<br>
        LOOPS: ${상태.루프횟수}
      </div>
      <div class="ending-narration">모든 데이터를 통제할 수 있지만,<br>이제 나를 불러줄 사람은 아무도 없다.</div>
      <button class="btn-primary" onclick="재시작()">[ SYSTEM REBOOT ]</button>
    `;
  }

  /* ⭐ innerHTML 이후에 video 삽입 — 덮어쓰이지 않음 */
  const oldVid = document.getElementById('ending-video-bg');

  const vidEl = document.createElement('video');

  };
  el.insertBefore(vidEl, el.firstChild);
}

/* ════════════════════════════════════════════════════════════
   [JS-12] 선택지 클릭 처리
   ────────────────────────────────────────────────────────────
   idx: 선택한 선택지 인덱스 (0=A, 1=B)
   sid: 현재 씬 ID
   ════════════════════════════════════════════════════════════ */
function 선택(idx, sid) {
  const c = 씬목록[sid].선택지[idx];
  변수적용(c.델타, c.특수);
  /* 200ms 딜레이: 변수 팝업이 먼저 뜨고 씬이 전환되도록 */
  setTimeout(() => 씬렌더(c.다음), 200);
}

/* ════════════════════════════════════════════════════════════
   [JS-13] 델타 포맷 (선택지 하단 변수 변화 텍스트)
   ────────────────────────────────────────────────────────────
   ex) { SYNC: +20, NOISE: -10 } → "SYNC +20 | NOISE -10"
   긍정 변화(SYNC↑, INTEG↑, NOISE↓) → 초록색
   부정 변화 → 빨간색
   ════════════════════════════════════════════════════════════ */
function 델타포맷(델타) {
  return Object.entries(델타).map(([k, v]) => {
    if (v === -999) return 'INTEG → 0';
    const clr = (v > 0 && k !== 'NOISE') || (v < 0 && k === 'NOISE')
      ? 'var(--green)' : 'var(--red)';
    return `<span style="color:${clr}">${k} ${v > 0 ? '+' : ''}${v}</span>`;
  }).join(' | ');
}
